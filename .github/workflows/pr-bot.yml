name: PR Guardian Bot

on:
  schedule:
    - cron: "0 10 * * 5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without comments/merge/discord"
        required: false
        default: "true"
      target_owner:
        description: "Target repository owner. Defaults to vars.TARGET_REPO_OWNER"
        required: false
      target_repo:
        description: "Target repository name. Defaults to vars.TARGET_REPO_NAME"
        required: false

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: chmod +x ./gradlew
      - run: ./gradlew build
      - name: Validate target repository settings
        run: |
          if [[ -z "$REPO_OWNER" || -z "$REPO_NAME" ]]; then
            echo "::error::Set TARGET_REPO_OWNER and TARGET_REPO_NAME repository/organization variables, or provide workflow_dispatch inputs."
            exit 1
          fi

          if [[ -z "$GITHUB_TOKEN" ]]; then
            echo "::error::Set BOT_GITHUB_TOKEN secret with permissions to the target repository."
            exit 1
          fi

          echo "Target repository: ${REPO_OWNER}/${REPO_NAME}"
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.event.inputs.target_owner || vars.TARGET_REPO_OWNER }}
          REPO_NAME: ${{ github.event.inputs.target_repo || vars.TARGET_REPO_NAME }}
      - run: ./gradlew bootRun
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.event.inputs.target_owner || vars.TARGET_REPO_OWNER }}
          REPO_NAME: ${{ github.event.inputs.target_repo || vars.TARGET_REPO_NAME }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          DISCORD_ENABLED: ${{ vars.DISCORD_ENABLED || 'false' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
